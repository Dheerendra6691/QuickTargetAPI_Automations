name: API Smoke Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: 17
  PYTHON_VERSION: "3.11"
  TEST_ENV: qa

jobs:
  smoke-tests:

    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Dry@6691
          POSTGRES_DB: quick_db

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    concurrency:
      group: smoke-tests
      cancel-in-progress: true

    steps:

      ######################################################################
      # Checkout
      ######################################################################

      - name: Checkout Automation Repository
        uses: actions/checkout@v4

      - name: Checkout API Repository
        uses: actions/checkout@v4
        with:
          repository: Dheerendra6691/HES_API
          path: HES_API


      ######################################################################
      # Python Setup
      ######################################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install API Dependencies
        working-directory: HES_API
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      ######################################################################
      # Verify Database
      ######################################################################

      - name: Verify PostgreSQL
        env:
          PGPASSWORD: Dry@6691
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

          pg_isready \
            -h 127.0.0.1 \
            -p 5432 \
            -U postgres


      ######################################################################
      # Validate FastAPI Import
      ######################################################################

      - name: Validate FastAPI Import
        working-directory: HES_API
        env:
          DATABASE_URL: postgresql://postgres:Dry%406691@127.0.0.1:5432/quick_db
        run: |
          python -c "from app.main import app; print('FastAPI import successful')"


      ######################################################################
      # Start API
      ######################################################################

      - name: Start FastAPI Server
        working-directory: HES_API
        env:
          DATABASE_URL: postgresql://postgres:Dry%406691@127.0.0.1:5432/quick_db
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > api.log 2>&1 &

          sleep 5

          echo "========= API LOG ========="
          cat api.log || true


      ######################################################################
      # Health Check
      ######################################################################

      - name: Wait For API Startup
        run: |
          for i in {1..30}
          do

            echo "Attempt: $i"

            if curl -f http://127.0.0.1:8000/docs
            then
              echo "API started successfully"
              exit 0
            fi

            echo "Waiting for API..."

            cat HES_API/api.log || true

            sleep 2

          done

          echo "API failed"

          cat HES_API/api.log || true

          exit 1


      ######################################################################
      # Java Setup
      ######################################################################

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven


      ######################################################################
      # Build
      ######################################################################

      - name: Verify Build
        run: |
          mvn clean compile -DskipTests


      ######################################################################
      # Execute Tests
      ######################################################################

      - name: Run Smoke Tests
        run: |
          mvn test \
            -DsuiteXmlFile=src/test/resources/testng/testng-smoke.xml \
            -Denv=${{ env.TEST_ENV }}


      ######################################################################
      # Reporting
      ######################################################################

      - name: Generate Allure Report
        if: always()
        run: |
          mvn allure:report


      ######################################################################
      # Diagnostics
      ######################################################################

      - name: Collect Runtime Diagnostics
        if: always()
        run: |
          echo "========= API PROCESS ========="
          ps -ef | grep uvicorn || true

          echo "========= PORT ========="
          netstat -tulpn | grep 8000 || true

          echo "========= API LOG ========="
          cat HES_API/api.log || true


      ######################################################################
      # Upload Reports
      ######################################################################

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          retention-days: 15
          path: |
            target/allure-results
            target/site/allure-maven-plugin
            target/surefire-reports
            logs
            HES_API/api.log
