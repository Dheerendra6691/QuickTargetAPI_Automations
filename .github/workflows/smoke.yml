name: API Smoke Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: 17
  PYTHON_VERSION: "3.11"
  TEST_ENV: qa

jobs:
  smoke-tests:

    runs-on: ubuntu-latest
    timeout-minutes: 30

    concurrency:
      group: smoke-tests
      cancel-in-progress: true

    steps:

      - name: Checkout Automation Repository
        uses: actions/checkout@v4


      - name: Checkout API Repository
        uses: actions/checkout@v4
        with:
          repository: Dheerendra6691/HES_API
          path: HES_API


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}


      - name: Install API Dependencies
        run: |
          cd HES_API
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Start FastAPI Server
        run: |
          cd HES_API
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 > api.log 2>&1 &


      - name: Wait for API Startup
        run: sleep 20


      - name: Verify API is Running
        run: |
          curl http://127.0.0.1:8000/docs


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven


      - name: Verify Build
        run: mvn clean compile -DskipTests


      - name: Run Smoke Tests
        run: >
          mvn test
          -DsuiteXmlFile=src/test/resources/testng/testng-smoke.xml
          -Denv=${{ env.TEST_ENV }}


      - name: Generate Allure Report
        if: always()
        run: mvn allure:report


      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          retention-days: 15
          path: |
            target/allure-results
            target/site/allure-maven-plugin
            target/surefire-reports
            logs
            HES_API/api.log